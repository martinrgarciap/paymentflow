spring.application.name=paymentflow-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/paymentflow_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

jwt.secret=${JWT_SECRET:my-super-secret-jwt-key-1234567890}
jwt.expiration-ms=86400000

management.endpoints.web.exposure.include=health,info